name: Deploy Main

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pr-preview-main
  cancel-in-progress: false

jobs:
  deploy-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          cache: true

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build --base="/latest/"

      - name: Deploy to gh-pages latest/
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            git fetch origin +gh-pages:gh-pages
            git worktree add /tmp/gh-pages-wt gh-pages
          else
            git worktree add --orphan -b gh-pages /tmp/gh-pages-wt
          fi

          cd /tmp/gh-pages-wt

          # main only ever writes to latest/, so PR preview folders (pr-*/)
          # at the root are never touched by this job.
          rm -rf latest
          mkdir -p latest
          cp -r "${GITHUB_WORKSPACE}/dist/." latest/
          touch .nojekyll

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "deploy: production from main (${GITHUB_SHA::7})"

            for i in 1 2 3 4 5; do
              if git pull --rebase origin gh-pages && git push origin gh-pages; then
                break
              fi
              echo "Push failed, retrying (${i}/5)..."
              sleep $((RANDOM % 5 + 1))
              if [ "$i" -eq 5 ]; then
                echo "::error::Failed to push production deploy after 5 attempts"
                exit 1
              fi
            done
          fi
