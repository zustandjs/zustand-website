name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          cache: true

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy to gh-pages
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Bootstrap gh-pages as an orphan branch if it doesn't exist yet.
          # Done via a worktree so we never touch the checked-out PR branch.
          if git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            git fetch origin +gh-pages:gh-pages
            git worktree add /tmp/gh-pages-wt gh-pages
          else
            git worktree add --orphan -b gh-pages /tmp/gh-pages-wt
            (
              cd /tmp/gh-pages-wt
              touch .nojekyll
              git add .nojekyll
              git commit -m "chore: initialize gh-pages"
            )
          fi

          # Drop this PR's build into its own subdirectory
          rm -rf "/tmp/gh-pages-wt/pr-${PR_NUMBER}"
          mkdir -p "/tmp/gh-pages-wt/pr-${PR_NUMBER}"
          cp -r dist/. "/tmp/gh-pages-wt/pr-${PR_NUMBER}/"

          cd /tmp/gh-pages-wt
          git add "pr-${PR_NUMBER}"

          if git diff --cached --quiet; then
            echo "No changes to deploy"
          else
            git commit -m "deploy: preview for PR #${PR_NUMBER}"

            # Concurrent PR deploys can race on the push; retry with rebase.
            for i in 1 2 3 4 5; do
              if git pull --rebase origin gh-pages && git push origin gh-pages; then
                break
              fi
              echo "Push failed, retrying (${i}/5)..."
              sleep $((RANDOM % 5 + 1))
              if [ "$i" -eq 5 ]; then
                echo "::error::Failed to push preview after 5 attempts"
                exit 1
              fi
            done
          fi

          # Clean up the worktree. Non-fatal: the runner is destroyed right
          # after this job anyway, so a stray cleanup failure here shouldn't
          # mask an otherwise successful deploy.
          cd "$GITHUB_WORKSPACE"
          git worktree remove /tmp/gh-pages-wt || true

      - name: Comment preview URL on PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PREVIEW_URL="https://${OWNER}.github.io/${REPO}/pr-${PR_NUMBER}/"
          MARKER="<!-- pr-preview-action -->"
          SHORT_SHA=$(git rev-parse --short HEAD)

          existing=$(gh api "repos/${OWNER}/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id" | head -n1)

          # Built with printf (not an indented heredoc-style string) so no
          # literal leading whitespace sneaks into the body — 4+ leading
          # spaces on a line makes GitHub Markdown render it as a code block.
          BODY=$(printf '%s\n### 🔍 Preview deployed\n\n%s\n\nUpdated %s from `%s`' \
            "$MARKER" "$PREVIEW_URL" "$(date -u +'%Y-%m-%d %H:%M:%S UTC')" "$SHORT_SHA")

          if [ -n "$existing" ]; then
            gh api -X PATCH "repos/${OWNER}/${REPO}/issues/comments/${existing}" -f body="$BODY"
          else
            gh pr comment "$PR_NUMBER" --body "$BODY"
          fi
